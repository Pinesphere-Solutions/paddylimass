<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link rel="icon" type="image/png" href="{% static 'media/MA.png' %}?v=2" />
  <link rel="stylesheet" href="{% static 'paddy_app/css/login.css' %}?v=26" />
  <style>
    .reset-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 8px 40px rgba(17, 153, 142, 0.13);
      width: 100%;
      max-width: 420px;
      position: relative;
    }
    .reset-card .decorative-corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #11998e;
      border-style: solid;
      opacity: 0.5;
    }
    .reset-card .corner-top-left  { top: 12px; left: 12px;  border-width: 2px 0 0 2px; border-radius: 6px 0 0 0; }
    .reset-card .corner-top-right { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 6px 0 0; }

    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 28px;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .step-circle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      border: 2px solid #11998e;
      background: #11998e;
      color: #fff;
      transition: all 0.3s;
    }
    .step.inactive .step-circle {
      background: #fff;
      color: #11998e;
      opacity: 0.5;
    }
    .step-label {
      font-size: 10px;
      color: #11998e;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .step.inactive .step-label { opacity: 0.45; }
    .step-line {
      width: 48px;
      height: 2px;
      background: #e0f2f1;
      margin: 0 4px;
      margin-bottom: 18px;
      border-radius: 2px;
    }
    .step-line.done { background: #11998e; }

    .reset-card h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin: 0 0 6px;
    }
    .reset-card h2 .highlight { color: #11998e; }
    .reset-card .sub {
      font-size: 13.5px;
      color: #777;
      margin: 0 0 26px;
      line-height: 1.6;
    }
    .reset-card label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 7px;
      text-transform: uppercase;
    }
    .reset-card input[type="email"],
    .reset-card input[type="text"],
    .reset-card input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      color: #333;
      background: #fafafa;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .reset-card input:focus {
      border-color: #11998e;
      box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.1);
      background: #fff;
    }
    .reset-card .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 22px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .reset-card .submit-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .reset-card .submit-btn:active { transform: translateY(0); }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 13.5px;
      color: #11998e;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.75; }
    .back-link svg { width: 15px; height: 15px; }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="background-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
    <div class="leaf-accent leaf-1"></div>
    <div class="leaf-accent leaf-2"></div>
  </div>

  <div class="auth-center">
    <div class="logo-container">
      <img src="{% static 'media/FULL.png' %}" alt="Logo" class="logo-above-login" />
    </div>

    <div class="reset-card">
      <div class="decorative-corner corner-top-left"></div>
      <div class="decorative-corner corner-top-right"></div>

      <!-- Step Indicator -->
      <div class="step-indicator">
        <div class="step active">
          <div class="step-circle">1</div>
          <span class="step-label">Email</span>
        </div>
        <div class="step-line"></div>
        <div class="step inactive">
          <div class="step-circle">2</div>
          <span class="step-label">Verify OTP</span>
        </div>
        <div class="step-line"></div>
        <div class="step inactive">
          <div class="step-circle">3</div>
          <span class="step-label">New Password</span>
        </div>
      </div>

      <h2><span class="highlight">Forgot</span> Password?</h2>
      <p class="sub">No worries! Enter your registered email address and we'll send you a one-time password.</p>

      <form method="POST" action="{% url 'login_app:forgot_password' %}">
        {% csrf_token %}
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your registered email"
          required
          autocomplete="email"
        />
        <button type="submit" class="submit-btn">SEND OTP</button>
      </form>

      <a href="{% url 'login_app:login' %}" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to Login
      </a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container">
  {% if messages %}{% for message in messages %}
  <div class="toast {% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}">
    {{ message }}
    <button type="button" class="toast-close" aria-label="Close">&times;</button>
  </div>
  {% endfor %}{% endif %}
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".toast").forEach((toast) => {
      setTimeout(() => {
        toast.style.animation = "fadeOutToast 0.3s forwards";
        setTimeout(() => toast.remove(), 300);
      }, 5000);
    });
    document.addEventListener("click", function (e) {
      if (e.target.classList.contains("toast-close")) {
        const toast = e.target.closest(".toast");
        if (toast) {
          toast.style.animation = "fadeOutToast 0.3s forwards";
          setTimeout(() => toast.remove(), 300);
        }
      }
    });
  });
</script>
</body>
</html>
