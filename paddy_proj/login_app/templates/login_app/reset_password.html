<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="icon" type="image/png" href="{% static 'media/MA.png' %}?v=2" />
  <link rel="stylesheet" href="{% static 'paddy_app/css/login.css' %}?v=26" />
  <style>
    .reset-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 8px 40px rgba(17, 153, 142, 0.13);
      width: 100%;
      max-width: 420px;
      position: relative;
    }
    .reset-card .decorative-corner { position: absolute; width: 28px; height: 28px; border-color: #11998e; border-style: solid; opacity: 0.5; }
    .reset-card .corner-top-left  { top: 12px; left: 12px;  border-width: 2px 0 0 2px; border-radius: 6px 0 0 0; }
    .reset-card .corner-top-right { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 6px 0 0; }

    .step-indicator { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 28px; }
    .step { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .step-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; border: 2px solid #11998e; background: #11998e; color: #fff; }
    .step.inactive .step-circle { background: #fff; color: #11998e; opacity: 0.5; }
    .step-label { font-size: 10px; color: #11998e; font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; }
    .step.inactive .step-label { opacity: 0.45; }
    .step-line { width: 48px; height: 2px; background: #e0f2f1; margin: 0 4px; margin-bottom: 18px; border-radius: 2px; }
    .step-line.done { background: #11998e; }

    .reset-card h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin: 0 0 6px; }
    .reset-card h2 .highlight { color: #11998e; }
    .reset-card .sub { font-size: 13.5px; color: #777; margin: 0 0 24px; line-height: 1.6; }

    .field-group { margin-bottom: 18px; }
    .field-group label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #555; margin-bottom: 7px; text-transform: uppercase; }

    .password-field-wrapper { position: relative; }
    .password-field-wrapper input {
      width: 100%;
      padding: 13px 46px 13px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      color: #333;
      background: #fafafa;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .password-field-wrapper input:focus { border-color: #11998e; box-shadow: 0 0 0 3px rgba(17,153,142,0.1); background: #fff; }
    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .password-toggle:hover { color: #11998e; }
    .password-toggle svg { width: 18px; height: 18px; }

    /* Strength meter */
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: #eee;
      margin-top: 8px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label { font-size: 11px; color: #aaa; margin-top: 4px; }

    .match-hint { font-size: 12px; margin-top: 5px; }
    .match-hint.ok { color: #11998e; }
    .match-hint.no { color: #e74c3c; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .submit-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="background-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
    <div class="leaf-accent leaf-1"></div>
    <div class="leaf-accent leaf-2"></div>
  </div>

  <div class="auth-center">
    <div class="logo-container">
      <img src="{% static 'media/FULL.png' %}" alt="Logo" class="logo-above-login" />
    </div>

    <div class="reset-card">
      <div class="decorative-corner corner-top-left"></div>
      <div class="decorative-corner corner-top-right"></div>

      <div class="step-indicator">
        <div class="step done">
          <div class="step-circle">✓</div>
          <span class="step-label">Email</span>
        </div>
        <div class="step-line done"></div>
        <div class="step done">
          <div class="step-circle">✓</div>
          <span class="step-label">Verify OTP</span>
        </div>
        <div class="step-line done"></div>
        <div class="step active">
          <div class="step-circle">3</div>
          <span class="step-label">New Password</span>
        </div>
      </div>

      <h2>New <span class="highlight">Password</span></h2>
      <p class="sub">Almost there! Create a strong password for your account.</p>

      <form method="POST" action="{% url 'login_app:reset_password' %}" id="reset-form">
        {% csrf_token %}

        <div class="field-group">
          <label for="password">New Password</label>
          <div class="password-field-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter new password"
              required
              minlength="6"
              autocomplete="new-password"
            />
            <button type="button" class="password-toggle" onclick="togglePwd('password', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-label" id="strength-label"></div>
        </div>

        <div class="field-group">
          <label for="confirm_password">Confirm New Password</label>
          <div class="password-field-wrapper">
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              placeholder="Confirm new password"
              required
              minlength="6"
              autocomplete="new-password"
            />
            <button type="button" class="password-toggle" onclick="togglePwd('confirm_password', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="match-hint" id="match-hint"></div>
        </div>

        <button type="submit" class="submit-btn">RESET PASSWORD</button>
      </form>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container">
  {% if messages %}{% for message in messages %}
  <div class="toast {% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}">
    {{ message }}
    <button type="button" class="toast-close" aria-label="Close">&times;</button>
  </div>
  {% endfor %}{% endif %}
</div>

<script>
  // ── Password toggle ──
  function togglePwd(id, btn) {
    const input = document.getElementById(id);
    const isPass = input.type === "password";
    input.type = isPass ? "text" : "password";
    btn.querySelector("svg").innerHTML = isPass
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-5.07 5.93m-5.02-5.02a3 3 0 1 1 4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
  }

  // ── Strength meter ──
  const pwdInput = document.getElementById("password");
  const fill = document.getElementById("strength-fill");
  const label = document.getElementById("strength-label");

  pwdInput.addEventListener("input", () => {
    const val = pwdInput.value;
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { pct: "0%",   color: "#eee",    text: "" },
      { pct: "25%",  color: "#e74c3c", text: "Weak" },
      { pct: "50%",  color: "#f39c12", text: "Fair" },
      { pct: "75%",  color: "#3498db", text: "Good" },
      { pct: "100%", color: "#11998e", text: "Strong" },
    ];
    const lvl = levels[Math.min(score, 4)];
    fill.style.width = lvl.pct;
    fill.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.color;
    checkMatch();
  });

  // ── Password match hint ──
  const confirmInput = document.getElementById("confirm_password");
  const matchHint = document.getElementById("match-hint");

  function checkMatch() {
    const p = pwdInput.value;
    const c = confirmInput.value;
    if (!c) { matchHint.textContent = ""; return; }
    if (p === c) {
      matchHint.textContent = "✓ Passwords match";
      matchHint.className = "match-hint ok";
    } else {
      matchHint.textContent = "✗ Passwords do not match";
      matchHint.className = "match-hint no";
    }
  }
  confirmInput.addEventListener("input", checkMatch);

  // ── Toast ──
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".toast").forEach((toast) => {
      setTimeout(() => {
        toast.style.animation = "fadeOutToast 0.3s forwards";
        setTimeout(() => toast.remove(), 300);
      }, 5000);
    });
    document.addEventListener("click", function (e) {
      if (e.target.classList.contains("toast-close")) {
        const t = e.target.closest(".toast");
        if (t) { t.style.animation = "fadeOutToast 0.3s forwards"; setTimeout(() => t.remove(), 300); }
      }
    });
  });
</script>
</body>
</html>
